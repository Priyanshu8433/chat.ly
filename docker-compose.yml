services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: priyanshu8433/chatly-client:latest
    ports:
      - "5173:5173"
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: priyanshu8433/chatly-server:latest
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
